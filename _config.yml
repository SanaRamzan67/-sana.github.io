# --- SEO & Social ---
twitter:
  username: ""
og_image: "/assets/images/profile.jpg"

social:
  type: Person
  name: "Sana Ramzan"
  links:
    - "https://www.linkedin.com/in/sana-ramzan-b21241407"
    - "https://github.com/YOUR_GITHUB_USERNAME"

# --- Build Settings ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# --- Defaults ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# --- Exclude from Build ---
exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - node_modules
