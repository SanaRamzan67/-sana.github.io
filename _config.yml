# --- Theme ---
# Using Minimal Mistakes — a clean, professional GitHub Pages theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"   # Options: air, aqua, contrast, dark, dirt, mint, neon, plum, sunrise

# --- Plugins ---
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# --- Navigation ---
navbar:
  links:
    - title: "Home"
      url: "/"
    - title: "Projects"
      url: "/projects/"
    - title: "Skills"
      url: "/skills/"
    - title: "Contact"
      url: "/contact/"

# --- Skills ---
skills:
  languages:
    - name: C
      level: Proficient
    - name: C++
      level: Proficient
    - name: Java
      level: Proficient
    - name: Python
      level: Intermediate
    - name: SQL
      level: Intermediate
  concepts:
    - Data Structures
    - Algorithms
    - Object-Oriented Programming
    - Database Management (DBMS)
    - Embedded Systems (Arduino)

# --- Projects ---
projects:
  - name: "Tic Tac Toe Game"
    tech: "C++"
    desc: "Console-based two-player game with win detection logic."
    category: "Game Development"

  - name: "University Management System"
    tech: "Java (GUI) + SQL"
    desc: "Desktop app for managing students, courses, and enrollments."
    category: "Full Stack / DBMS"

  - name: "Stack-Based Text Editor"
    tech: "C++ / Data Structures"
    desc: "Text editor using stack DSA for undo/redo functionality."
    category: "Data Structures & Algorithms"

  - name: "Arduino LED Controller"
    tech: "Arduino / IoT"
    desc: "Mobile-controlled blinking LED using Arduino hardware."
